name: Post Onboarding Instructions

on:
  push:
    branches: [master]
    paths:
      - 'infra/developers.yaml'

jobs:
  onboard:
    name: Post onboarding instructions
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Detect new developers
        id: detect
        run: |
          # Get developers.yaml from before and after this push
          git show HEAD~1:infra/developers.yaml > /tmp/old.yaml 2>/dev/null || echo "" > /tmp/old.yaml
          cp infra/developers.yaml /tmp/new.yaml

          NEW_DEVS=$(python3 -c "
          import yaml
          old = yaml.safe_load(open('/tmp/old.yaml')) or {}
          new = yaml.safe_load(open('/tmp/new.yaml')) or {}
          added = [k for k in new if k not in old]
          print(' '.join(added))
          ")

          echo "new_devs=$NEW_DEVS" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW_DEVS" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find merged PR
        id: pr
        if: steps.detect.outputs.has_new == 'true'
        run: |
          PR_NUMBER=$(gh pr list --state merged --search "${{ github.sha }}" --json number -q '.[0].number' 2>/dev/null || echo "")
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post onboarding instructions
        if: steps.detect.outputs.has_new == 'true' && steps.pr.outputs.number != ''
        run: |
          for DEV_NAME in ${{ steps.detect.outputs.new_devs }}; do
            GITHUB_USER=$(python3 -c "
          import yaml
          with open('infra/developers.yaml') as f:
              data = yaml.safe_load(f)
          print(data['$DEV_NAME'].get('github_username', '$DEV_NAME'))
          ")

            gh pr comment ${{ steps.pr.outputs.number }} --body "$(cat <<EOF
          ## Welcome @${GITHUB_USER}! Your ClaudeClaw instance is being set up.

          An admin will run \`terraform apply\` to provision your instance. Once that's done, they'll share your instance ID and you can complete setup:

          ### Admin steps (for @kevinvegda)
          - [ ] Add secrets to \`terraform.tfvars\` (telegram_token, slack_token for **${DEV_NAME}**)
          - [ ] Run \`cd infra && terraform apply\`
          - [ ] Share the onboard command: \`terraform output onboard_commands\`

          ### Your setup steps
          1. **Make sure you have:**
             - AWS CLI installed and configured
             - A [GitHub Personal Access Token](https://github.com/settings/tokens) with \`repo\` and \`read:org\` scopes
             - Your git commit email

          2. **Run the onboarding script** (admin will give you the instance ID):
             \`\`\`bash
             cd infra && ./scripts/onboard-dev.sh <instance-id>
             \`\`\`

          3. **Authenticate Claude Code** — inside the SSM session that opens:
             \`\`\`bash
             claude
             \`\`\`
             This shows a URL. Open it in your browser to log in.

          4. **Activate the daemon** — copies your credentials and starts ClaudeClaw:
             \`\`\`bash
             sudo /opt/claudeclaw/activate.sh
             \`\`\`

          5. **Verify everything works:**
             \`\`\`bash
             sudo systemctl status claudeclaw   # daemon running
             ls ~/repos/                         # repos cloned
             \`\`\`

          6. **Test Telegram** — send a message to your bot!

          ---
          *If you need to re-authenticate later, SSM in, run \`claude\`, then \`sudo /opt/claudeclaw/activate.sh\`.*
          EOF
          )"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
