name: Developer Onboarding

on:
  pull_request:
    paths:
      - 'infra/developers.yaml'
  push:
    branches: [master]
    paths:
      - 'infra/developers.yaml'

jobs:
  # --- PR opened/updated: post instructions for the new dev ---
  pre-merge-instructions:
    name: Post setup instructions
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Detect new developers
        id: detect
        run: |
          git show origin/${{ github.base_ref }}:infra/developers.yaml > /tmp/old.yaml 2>/dev/null || echo "" > /tmp/old.yaml
          cp infra/developers.yaml /tmp/new.yaml

          NEW_DEVS=$(python3 -c "
          import yaml
          old = yaml.safe_load(open('/tmp/old.yaml')) or {}
          new = yaml.safe_load(open('/tmp/new.yaml')) or {}
          added = [k for k in new if k not in old]
          print(' '.join(added))
          ")

          echo "new_devs=$NEW_DEVS" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW_DEVS" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post pre-merge comment
        if: steps.detect.outputs.has_new == 'true'
        run: |
          for DEV_NAME in ${{ steps.detect.outputs.new_devs }}; do
            GITHUB_USER=$(python3 -c "
          import yaml
          with open('infra/developers.yaml') as f:
              data = yaml.safe_load(f)
          print(data['$DEV_NAME'].get('github_username', '$DEV_NAME'))
          ")

            gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<EOF
          ## 👋 Welcome @${GITHUB_USER}!

          Before this PR can be merged, please store your secrets:

          1. **Get your Telegram bot token** from [@BotFather](https://t.me/BotFather)
          2. **Run the [Set Dev Secrets](/${{ github.repository }}/actions/workflows/set-dev-secrets.yml) workflow:**
             - Click **"Run workflow"**
             - \`dev_name\`: \`${DEV_NAME}\`
             - \`telegram_token\`: your bot token
             - \`slack_token\`: your Slack user token (optional)
          3. **Comment here** confirming you've done this

          An admin will then review and merge. Terraform will provision your instance automatically.
          EOF
          )"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Merged to master: terraform apply + post onboarding instructions ---
  terraform-apply:
    name: Provision infrastructure
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Detect new developers
        id: detect
        run: |
          git show HEAD~1:infra/developers.yaml > /tmp/old.yaml 2>/dev/null || echo "" > /tmp/old.yaml
          cp infra/developers.yaml /tmp/new.yaml

          NEW_DEVS=$(python3 -c "
          import yaml
          old = yaml.safe_load(open('/tmp/old.yaml')) or {}
          new = yaml.safe_load(open('/tmp/new.yaml')) or {}
          added = [k for k in new if k not in old]
          print(' '.join(added))
          ")

          echo "new_devs=$NEW_DEVS" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW_DEVS" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.detect.outputs.has_new == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"
          terraform_wrapper: false

      - name: Configure AWS credentials
        if: steps.detect.outputs.has_new == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-2

      - name: Terraform Init
        if: steps.detect.outputs.has_new == 'true'
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        if: steps.detect.outputs.has_new == 'true'
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: steps.detect.outputs.has_new == 'true'
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: Get instance info
        if: steps.detect.outputs.has_new == 'true'
        id: instances
        working-directory: infra
        run: |
          INSTANCE_JSON=$(terraform output -json developer_instances)
          echo "instances=$INSTANCE_JSON" >> "$GITHUB_OUTPUT"

      - name: Find merged PR
        if: steps.detect.outputs.has_new == 'true'
        id: pr
        run: |
          PR_NUMBER=$(gh pr list --state merged --search "${{ github.sha }}" --json number -q '.[0].number' 2>/dev/null || echo "")
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post onboarding instructions
        if: steps.detect.outputs.has_new == 'true' && steps.pr.outputs.number != ''
        run: |
          for DEV_NAME in ${{ steps.detect.outputs.new_devs }}; do
            INSTANCE_ID=$(echo '${{ steps.instances.outputs.instances }}' | jq -r ".${DEV_NAME}")

            GITHUB_USER=$(python3 -c "
          import yaml
          with open('infra/developers.yaml') as f:
              data = yaml.safe_load(f)
          print(data['$DEV_NAME'].get('github_username', '$DEV_NAME'))
          ")

            gh pr comment ${{ steps.pr.outputs.number }} --body "$(cat <<EOF
          ## ✅ @${GITHUB_USER} — your instance is ready!

          **Instance ID:** \`${INSTANCE_ID}\`

          ### Setup steps

          1. **Connect via SSM** (requires AWS CLI + Session Manager plugin):
             \`\`\`bash
             cd infra && ./scripts/onboard-dev.sh ${INSTANCE_ID}
             \`\`\`

          2. **Authenticate Claude Code** — inside the SSM session:
             \`\`\`bash
             claude
             \`\`\`
             This shows a URL. Open it in your browser to log in.

          3. **Activate the daemon** — copies credentials and starts ClaudeClaw:
             \`\`\`bash
             sudo /opt/claudeclaw/activate.sh
             \`\`\`

          4. **Verify:**
             \`\`\`bash
             sudo systemctl status claudeclaw   # daemon running
             ls ~/repos/                         # repos cloned
             \`\`\`

          5. **Test Telegram** — send a message to your bot!

          ---
          *To re-authenticate later: SSM in, run \`claude\`, then \`sudo /opt/claudeclaw/activate.sh\`.*
          EOF
          )"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
