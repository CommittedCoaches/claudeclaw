name: Deploy to instances

on:
  push:
    branches: [master]
    paths-ignore:
      - 'infra/**'
      - '*.md'

jobs:
  deploy:
    name: Pull latest code on all instances
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get instance IDs
        id: instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=claudeclaw" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)
          echo "ids=$INSTANCE_IDS" >> "$GITHUB_OUTPUT"
          echo "Found instances: $INSTANCE_IDS"

      - name: Deploy via SSM
        run: |
          for INSTANCE_ID in ${{ steps.instances.outputs.ids }}; do
            echo "Deploying to $INSTANCE_ID..."

            # Get dev name from instance tag
            DEV_NAME=$(aws ec2 describe-tags \
              --filters "Name=resource-id,Values=$INSTANCE_ID" "Name=key,Values=Name" \
              --query "Tags[0].Value" --output text | sed 's/claudeclaw-dev-//')

            INSTALL_DIR="/opt/claudeclaw/$DEV_NAME"

            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "{\"commands\":[\"export HOME=/root && git config --global --add safe.directory $INSTALL_DIR && cd $INSTALL_DIR && git pull origin master && git config --global --unset-all safe.directory && chown -R $DEV_NAME:$DEV_NAME $INSTALL_DIR && systemctl restart claudeclaw && echo DEPLOYED\"]}" \
              --query "Command.CommandId" --output text)

            echo "  Command: $CMD_ID"

            # Wait for completion
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query "Status" --output text 2>/dev/null || echo "Pending")
              if [ "$STATUS" = "Success" ]; then
                echo "  $INSTANCE_ID ($DEV_NAME): deployed"
                break
              elif [ "$STATUS" = "Failed" ]; then
                echo "  $INSTANCE_ID ($DEV_NAME): FAILED"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text
                break
              fi
            done
          done
