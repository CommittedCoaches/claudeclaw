name: Set Dev Secrets

on:
  workflow_dispatch:
    inputs:
      dev_name:
        description: 'Your developer name (must match your key in developers.yaml)'
        required: true
        type: string
      telegram_token:
        description: 'Telegram bot token (from @BotFather)'
        required: true
        type: string
      slack_token:
        description: 'Slack user token (xoxp-...), leave empty if not needed'
        required: false
        type: string
        default: ''

jobs:
  store-secrets:
    name: Store tokens in Secrets Manager
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate dev_name and permissions
        run: |
          DEV_NAME="${{ inputs.dev_name }}"

          # Validate format
          if ! echo "$DEV_NAME" | grep -qE '^[a-z0-9_-]+$'; then
            echo "::error::Invalid dev_name: must be lowercase alphanumeric with hyphens/underscores"
            exit 1
          fi

          # Check dev exists in developers.yaml
          GITHUB_USER=$(python3 -c "
          import yaml, sys
          with open('infra/developers.yaml') as f:
              data = yaml.safe_load(f) or {}
          dev = data.get('$DEV_NAME')
          if not dev:
              print('NOT_FOUND', file=sys.stderr)
              sys.exit(1)
          print(dev.get('github_username', ''))
          " 2>&1) || {
            echo "::error::Developer '$DEV_NAME' not found in developers.yaml. Add yourself via PR first."
            exit 1
          }

          # Verify the caller matches the github_username for this dev
          if [ -n "$GITHUB_USER" ] && [ "$GITHUB_USER" != "${{ github.actor }}" ]; then
            echo "::error::Permission denied: you (${{ github.actor }}) are not the github_username ($GITHUB_USER) for dev '$DEV_NAME'"
            exit 1
          fi

          echo "Validated: dev_name=$DEV_NAME, github_username=$GITHUB_USER, actor=${{ github.actor }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SECRETS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Store secrets in Secrets Manager
        run: |
          DEV_NAME="${{ inputs.dev_name }}"
          SECRET_NAME="claudeclaw/dev/${DEV_NAME}/tokens"

          # Build JSON (only include slack_token if provided)
          SLACK_TOKEN="${{ inputs.slack_token }}"
          if [ -n "$SLACK_TOKEN" ]; then
            SECRET_JSON=$(jq -n \
              --arg tg "${{ inputs.telegram_token }}" \
              --arg sl "$SLACK_TOKEN" \
              '{"telegram_token": $tg, "slack_token": $sl}')
          else
            SECRET_JSON=$(jq -n \
              --arg tg "${{ inputs.telegram_token }}" \
              '{"telegram_token": $tg}')
          fi

          # Create or update
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" &>/dev/null; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$SECRET_JSON"
            echo "Updated existing secret: $SECRET_NAME"
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Per-dev tokens for ClaudeClaw developer ${DEV_NAME}" \
              --secret-string "$SECRET_JSON" \
              --tags "Key=Project,Value=claudeclaw" "Key=Developer,Value=${DEV_NAME}"
            echo "Created new secret: $SECRET_NAME"
          fi

          echo "✅ Secrets stored for $DEV_NAME. Your PR can now be merged."
